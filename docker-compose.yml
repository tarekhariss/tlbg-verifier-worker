services:
  email-verifier:
    # Built locally from ./engine — wraps the open-source AfterShip
    # email-verifier Go library (MIT). No private registry images.
    build: ./engine
    container_name: tlbg-email-verifier
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      # Most PaaS (Railway, Fly free, Render) block outbound port 25.
      # Set to "0" only when running on a host with SMTP egress.
      - DISABLE_SMTP_CHECK=${DISABLE_SMTP_CHECK:-0}
      - SMTP_HELO_NAME=${SMTP_HELO_NAME:-}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-}

  worker:
    build: .
    container_name: tlbg-verifier-worker
    restart: unless-stopped
    env_file: .env
    environment:
      - VERIFIER_URL=http://email-verifier:8080
    depends_on:
      - email-verifier
