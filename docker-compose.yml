services:
  email-verifier:
    # AfterShip email-verifier — MIT licensed Go SMTP verifier.
    # https://github.com/AfterShip/email-verifier
    image: ghcr.io/aftership/email-verifier:latest
    container_name: tlbg-email-verifier
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      - VERIFIER_LISTEN=:8080

  worker:
    build: .
    container_name: tlbg-verifier-worker
    restart: unless-stopped
    env_file: .env
    environment:
      - VERIFIER_URL=http://email-verifier:8080
    depends_on:
      - email-verifier
